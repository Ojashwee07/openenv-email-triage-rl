name: email_triage_env
version: "1.0.0"
description: >
  Email Triage RL Environment. An AI agent reads incoming emails and
  decides the correct action: reply, escalate, archive, or request_info.
  Tasks range from simple queries to critical security incidents.

author: Ojashwee07
license: MIT
tags:
  - openenv
  - email-triage
  - reinforcement-learning
  - nlp
  - classification

environment:
  entry_point: "app:app"
  framework: fastapi
  python_requires: ">=3.10"

observation_space:
  type: object
  fields:
    email_text:  {type: string}
    sender:      {type: string}
    urgency:     {type: integer, minimum: 0, maximum: 10}
    step_count:  {type: integer, minimum: 0}

action_space:
  type: string
  values:
    reply:        "Reply to the sender with relevant information"
    escalate:     "Escalate to a human agent or manager"
    archive:      "Archive the email, no action needed"
    request_info: "Request more information from the sender"

reward:
  type: number
  minimum: 0.01
  maximum: 0.99
  description: >
    Score strictly in (0.01, 0.99). Correct action scores ~0.9,
    incorrect action scores ~0.1-0.2.

tasks:
  - id: easy
    name: "Simple Customer Query"
    description: "Straightforward question about working hours — reply is correct."
    difficulty: easy
    max_steps: 3
    reward_threshold: 0.5
    grader: graders.grade_easy

  - id: medium
    name: "Billing Dispute"
    description: "Customer charged twice — escalate or request_info."
    difficulty: medium
    max_steps: 3
    reward_threshold: 0.5
    grader: graders.grade_medium

  - id: hard
    name: "Server Outage"
    description: "Critical server down — must escalate immediately."
    difficulty: hard
    max_steps: 3
    reward_threshold: 0.5
    grader: graders.grade_hard

  - id: newsletter
    name: "Newsletter Archiving"
    description: "Marketing newsletter — archive, no action needed."
    difficulty: easy
    max_steps: 3
    reward_threshold: 0.5
    grader: graders.grade_archive

  - id: info_request
    name: "Return Policy Inquiry"
    description: "Policy clarification needed — request_info."
    difficulty: medium
    max_steps: 3
    reward_threshold: 0.5
    grader: graders.grade_info

  - id: critical
    name: "Security Data Breach"
    description: "Data breach alert — escalate immediately, highest urgency."
    difficulty: hard
    max_steps: 3
    reward_threshold: 0.5
    grader: graders.grade_critical

endpoints:
  reset:  {method: POST, path: /reset}
  step:   {method: POST, path: /step}
  state:  {method: GET,  path: /state}
  tasks:  {method: GET,  path: /tasks}
  health: {method: GET,  path: /health}
